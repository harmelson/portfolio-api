version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: portfolio-api
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/app
      PORT: 8080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-fake-client-id.apps.googleusercontent.com}
      DEV_AUTH_ENABLED: "true"
      DEV_AUTH_TOKEN: "dev-token"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
